name: flowee_app
description: "Pulsar - La mobilité événementielle réinventée."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # STATE MANAGEMENT (STABLE)
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ROUTING
  go_router: ^14.8.1

  # FIRESTORE (cloud-first, offline-first via SDK cache)
  cloud_firestore: ^5.4.0

  # CLOUD FUNCTIONS (secure Stripe checkout — server computes the amount)
  cloud_functions: ^5.1.3

  # CODE GENERATION MODELS
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UI
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.16

  # UTILS
  intl: ^0.20.2
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  connectivity_plus: ^6.1.1
  package_info_plus: ^8.1.3

  # ICONS / FONTS
  material_design_icons_flutter: ^7.0.7296
  google_fonts: ^6.2.1

  # QR
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.2

  # MAPS (no API key, OpenStreetMap)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # FIREBASE — pinned to versions that build cleanly on Windows
  firebase_core: 3.15.2
  firebase_auth: 5.7.0

  # MISC
  uuid: ^4.5.1
  timeago: ^3.7.0
  collection: ^1.19.0
  crypto: ^3.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mockito: ^5.4.4

  # BUILD SYSTEM (COMPATIBLE FIX)
  build_runner: ^2.4.9

  freezed: ">=2.4.0 <2.5.3"
  json_serializable: ^6.8.0

  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/logo.png
    - assets/images/
    - assets/icons/
    - assets/l10n/

  fonts:
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-Regular.ttf
        - asset: assets/fonts/SpaceGrotesk-Bold.ttf