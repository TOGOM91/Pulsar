<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulsar - Vis tes événements à fond</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cyan: #00D9CC;
      --yellow: #F5C542;
      --purple: #D96AE8;
      --light: #F2F0EF;
      --dark: #2B2B2B;
      --gray: #5A5A5A;
    }

    body { background: var(--dark); font-family: 'DM Sans', sans-serif; color: var(--light); overflow-x: hidden; }

    /* --- ANIMATIONS --- */
    @keyframes pulse-glow {
      0%, 100% { text-shadow: 0 0 20px var(--cyan), 0 0 40px var(--cyan); }
      50% { text-shadow: 0 0 40px var(--cyan), 0 0 80px var(--cyan), 0 0 120px var(--purple); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(-2deg); }
      50% { transform: translateY(-12px) rotate(2deg); }
    }
    @keyframes slide-up {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes star-spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes ticker {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    @keyframes card-in {
      from { opacity: 0; transform: translateY(30px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes grain {
      0%, 100% { transform: translate(0, 0); }
      10% { transform: translate(-2%, -3%); }
      30% { transform: translate(2%, 2%); }
      50% { transform: translate(-1%, 3%); }
      70% { transform: translate(3%, -1%); }
      90% { transform: translate(-3%, 1%); }
    }
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    /* --- GRAIN OVERLAY --- */
    .grain::before {
      content: '';
      position: fixed; inset: 0; z-index: 9999;
      pointer-events: none;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      animation: grain 0.5s steps(1) infinite;
    }

    /* --- NAV --- */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 18px 40px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(43,43,43,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(0,217,204,0.15);
    }
    .nav-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px; letter-spacing: 4px;
      color: var(--cyan);
      text-shadow: 2px 2px 0 var(--dark), 0 0 20px rgba(0,217,204,0.5);
      cursor: pointer;
    }
    .nav-links { display: flex; gap: 32px; align-items: center; }
    .nav-links a { color: var(--light); text-decoration: none; font-size: 14px; font-weight: 500; opacity: 0.8; transition: all 0.2s; letter-spacing: 0.5px; }
    .nav-links a:hover { opacity: 1; color: var(--cyan); }
    .nav-cta {
      background: var(--cyan); color: var(--dark);
      border: none; padding: 10px 24px; border-radius: 100px;
      font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 14px;
      cursor: pointer; transition: all 0.2s; letter-spacing: 0.5px;
    }
    .nav-cta:hover { background: var(--yellow); transform: scale(1.04); }

    /* --- HERO --- */
    .hero {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 120px 40px 80px;
      position: relative; overflow: hidden;
      text-align: center;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 30%, rgba(0,217,204,0.12) 0%, transparent 60%),
                  radial-gradient(ellipse 50% 50% at 80% 70%, rgba(217,106,232,0.1) 0%, transparent 50%),
                  radial-gradient(ellipse 40% 40% at 20% 60%, rgba(245,197,66,0.06) 0%, transparent 50%);
    }
    .hero-tag {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(0,217,204,0.1); border: 1px solid rgba(0,217,204,0.3);
      color: var(--cyan); padding: 6px 16px; border-radius: 100px;
      font-size: 12px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase;
      margin-bottom: 28px; animation: slide-up 0.6s ease both;
    }
    .hero-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(72px, 12vw, 160px);
      line-height: 0.9; letter-spacing: 6px;
      color: var(--light);
      text-shadow: 4px 4px 0 var(--dark);
      animation: slide-up 0.7s 0.1s ease both;
      position: relative; z-index: 1;
    }
    .hero-title span { color: var(--cyan); animation: pulse-glow 3s ease-in-out infinite; }
    .hero-sub {
      font-size: 18px; font-weight: 300; max-width: 560px;
      color: rgba(242,240,239,0.7); margin: 24px auto 0;
      line-height: 1.7; animation: slide-up 0.7s 0.2s ease both;
    }
    .hero-actions {
      display: flex; gap: 16px; justify-content: center; margin-top: 40px;
      animation: slide-up 0.7s 0.3s ease both;
    }
    .btn-primary {
      background: var(--cyan); color: var(--dark);
      border: none; padding: 16px 36px; border-radius: 100px;
      font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 16px;
      cursor: pointer; transition: all 0.25s; letter-spacing: 0.5px;
      box-shadow: 0 0 30px rgba(0,217,204,0.3);
    }
    .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 8px 40px rgba(0,217,204,0.5); }
    .btn-secondary {
      background: transparent; color: var(--light);
      border: 1.5px solid rgba(242,240,239,0.3); padding: 16px 36px; border-radius: 100px;
      font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: 16px;
      cursor: pointer; transition: all 0.25s;
    }
    .btn-secondary:hover { border-color: var(--cyan); color: var(--cyan); }

    /* --- PHONE MOCKUP --- */
    .hero-phones {
      display: flex; gap: 20px; justify-content: center; align-items: flex-end;
      margin-top: 60px; animation: slide-up 0.8s 0.4s ease both;
      position: relative; z-index: 1;
    }
    .phone {
      width: 220px; background: #1a1a1a;
      border-radius: 40px; overflow: hidden;
      border: 2px solid rgba(255,255,255,0.08);
      box-shadow: 0 40px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
      flex-shrink: 0;
    }
    .phone.main { transform: translateY(-20px); animation: float 4s ease-in-out infinite; }
    .phone.side { transform: scale(0.88); opacity: 0.7; }
    .phone-notch {
      height: 28px; background: #111;
      display: flex; align-items: center; justify-content: center;
    }
    .phone-notch-pill { width: 80px; height: 6px; background: #333; border-radius: 10px; }
    .phone-screen { padding: 16px; }

    /* Screen 1: Home */
    .screen-home { background: #1a1a1a; }
    .screen-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .screen-greeting { font-size: 11px; color: var(--gray); }
    .screen-user { font-size: 13px; font-weight: 600; color: var(--light); }
    .screen-avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--cyan); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--dark); }
    .event-card-big {
      border-radius: 16px; overflow: hidden;
      background: linear-gradient(135deg, #1e1e2e, #2a1a3e);
      border: 1px solid rgba(217,106,232,0.2);
      padding: 14px; margin-bottom: 12px;
    }
    .event-badge { display: inline-block; background: var(--purple); color: white; font-size: 8px; font-weight: 700; padding: 3px 8px; border-radius: 100px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .event-title { font-size: 14px; font-weight: 700; color: var(--light); margin-bottom: 4px; }
    .event-meta { font-size: 10px; color: var(--gray); }
    .event-price { font-size: 13px; font-weight: 700; color: var(--cyan); margin-top: 6px; }
    .mini-cards { display: flex; gap: 8px; }
    .mini-card {
      flex: 1; background: rgba(255,255,255,0.04); border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.07); padding: 10px;
    }
    .mini-icon { font-size: 16px; margin-bottom: 4px; }
    .mini-label { font-size: 9px; color: var(--gray); }
    .mini-val { font-size: 11px; font-weight: 600; color: var(--light); }
    .tab-bar {
      display: flex; justify-content: space-around; align-items: center;
      padding: 10px; background: #111; border-top: 1px solid rgba(255,255,255,0.05);
    }
    .tab { font-size: 18px; opacity: 0.4; cursor: pointer; }
    .tab.active { opacity: 1; }
    .tab-dot { width: 4px; height: 4px; background: var(--cyan); border-radius: 50%; margin: 2px auto 0; }

    /* Screen 2: Event detail */
    .screen-event { background: #1a1a1a; }
    .event-hero-img {
      height: 100px;
      background: linear-gradient(135deg, #0f1a2e, #1a0f2e);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; position: relative; overflow: hidden;
    }
    .event-hero-img::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 50%, rgba(0,217,204,0.3), transparent);
    }
    .event-detail-body { padding: 14px; }
    .event-name { font-size: 15px; font-weight: 700; color: var(--light); margin-bottom: 4px; }
    .event-date-row { display: flex; gap: 12px; margin-bottom: 12px; }
    .event-chip { font-size: 9px; color: var(--cyan); background: rgba(0,217,204,0.1); padding: 3px 8px; border-radius: 100px; border: 1px solid rgba(0,217,204,0.2); }
    .steps-row { display: flex; gap: 4px; margin-bottom: 12px; }
    .step-item { flex: 1; background: rgba(255,255,255,0.04); border-radius: 8px; padding: 8px 6px; text-align: center; border: 1px solid rgba(255,255,255,0.06); }
    .step-num { font-size: 14px; font-weight: 700; color: var(--cyan); }
    .step-lbl { font-size: 8px; color: var(--gray); margin-top: 2px; }
    .eco-bar { background: rgba(0,217,204,0.08); border: 1px solid rgba(0,217,204,0.2); border-radius: 10px; padding: 8px; }
    .eco-title { font-size: 9px; font-weight: 700; color: var(--cyan); margin-bottom: 4px; }
    .eco-track { height: 4px; background: rgba(255,255,255,0.08); border-radius: 10px; overflow: hidden; }
    .eco-fill { height: 100%; width: 70%; background: linear-gradient(90deg, var(--cyan), #00ff88); border-radius: 10px; }
    .eco-lbl { font-size: 8px; color: var(--gray); margin-top: 4px; }

    /* --- TICKER --- */
    .ticker-wrap {
      overflow: hidden; background: var(--cyan); padding: 12px 0;
      border-top: 1px solid rgba(0,0,0,0.1); border-bottom: 1px solid rgba(0,0,0,0.1);
    }
    .ticker-inner { display: flex; animation: ticker 20s linear infinite; white-space: nowrap; }
    .ticker-item { display: inline-flex; align-items: center; gap: 8px; padding: 0 20px; font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; color: var(--dark); }
    .ticker-sep { color: rgba(43,43,43,0.4); }

    /* --- FEATURES --- */
    .section { padding: 100px 40px; max-width: 1200px; margin: 0 auto; }
    .section-label {
      font-size: 11px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
      color: var(--cyan); margin-bottom: 12px;
      display: flex; align-items: center; gap: 8px;
    }
    .section-label::before { content: '//'; opacity: 0.5; }
    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(40px, 5vw, 72px); letter-spacing: 3px;
      line-height: 0.95; color: var(--light);
      margin-bottom: 60px;
    }
    .section-title em { font-style: normal; color: var(--cyan); }

    .features-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    .feature-card {
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px; padding: 28px;
      transition: all 0.3s;
      animation: card-in 0.5s ease both;
      position: relative; overflow: hidden;
    }
    .feature-card::before {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0; height: 2px;
      opacity: 0; transition: opacity 0.3s;
    }
    .feature-card:hover { transform: translateY(-6px); border-color: rgba(0,217,204,0.2); background: rgba(0,217,204,0.03); }
    .feature-card:hover::before { opacity: 1; background: linear-gradient(90deg, var(--cyan), var(--purple)); }
    .feature-icon { font-size: 28px; margin-bottom: 16px; }
    .feature-title { font-size: 16px; font-weight: 700; color: var(--light); margin-bottom: 8px; }
    .feature-desc { font-size: 13px; color: rgba(242,240,239,0.55); line-height: 1.6; font-weight: 300; }
    .feature-tag { display: inline-block; margin-top: 14px; font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 100px; text-transform: uppercase; letter-spacing: 0.5px; }

    /* --- JOURNEY SECTION --- */
    .journey-section { padding: 100px 40px; background: rgba(0,0,0,0.3); }
    .journey-inner { max-width: 1000px; margin: 0 auto; }
    .journey-steps { display: flex; flex-direction: column; gap: 0; position: relative; }
    .journey-steps::before {
      content: ''; position: absolute; left: 28px; top: 0; bottom: 0;
      width: 2px; background: linear-gradient(180deg, var(--cyan), var(--purple), var(--yellow));
      opacity: 0.3;
    }
    .journey-step {
      display: flex; gap: 32px; align-items: flex-start; padding: 28px 0;
      position: relative;
    }
    .journey-num {
      width: 56px; height: 56px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px;
      position: relative; z-index: 1;
    }
    .journey-content { padding-top: 8px; }
    .journey-title { font-size: 18px; font-weight: 700; color: var(--light); margin-bottom: 6px; }
    .journey-desc { font-size: 14px; color: rgba(242,240,239,0.55); line-height: 1.6; font-weight: 300; max-width: 500px; }

    /* --- STATS --- */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; margin: 80px 0; }
    .stat-item { padding: 40px 32px; background: rgba(255,255,255,0.02); text-align: center; border: 1px solid rgba(255,255,255,0.05); }
    .stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 56px; letter-spacing: 2px; background: linear-gradient(135deg, var(--cyan), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; }
    .stat-label { font-size: 13px; color: var(--gray); margin-top: 8px; font-weight: 300; }

    /* --- ECO SECTION --- */
    .eco-section {
      padding: 80px 40px;
      background: linear-gradient(135deg, rgba(0,217,204,0.05), rgba(217,106,232,0.05));
      border-top: 1px solid rgba(0,217,204,0.1); border-bottom: 1px solid rgba(0,217,204,0.1);
    }
    .eco-inner { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; }
    .eco-score {
      width: 200px; height: 200px; border-radius: 50%;
      background: conic-gradient(var(--cyan) 0% 72%, rgba(255,255,255,0.05) 72% 100%);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto; position: relative;
      box-shadow: 0 0 60px rgba(0,217,204,0.2);
    }
    .eco-score-inner {
      width: 150px; height: 150px; border-radius: 50%; background: #1a1a1a;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .eco-val { font-family: 'Bebas Neue', sans-serif; font-size: 48px; color: var(--cyan); letter-spacing: 2px; }
    .eco-unit { font-size: 12px; color: var(--gray); margin-top: -4px; }

    /* --- CTA SECTION --- */
    .cta-section {
      padding: 120px 40px; text-align: center;
      background: radial-gradient(ellipse 60% 80% at 50% 50%, rgba(0,217,204,0.08), transparent);
    }
    .cta-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(48px, 6vw, 88px); letter-spacing: 4px; color: var(--light); margin-bottom: 20px; }
    .cta-sub { font-size: 16px; color: rgba(242,240,239,0.55); margin-bottom: 40px; max-width: 480px; margin-left: auto; margin-right: auto; font-weight: 300; }
    .store-btns { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    .store-btn {
      display: flex; align-items: center; gap: 12px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px; padding: 14px 24px;
      cursor: pointer; transition: all 0.25s;
    }
    .store-btn:hover { background: rgba(0,217,204,0.1); border-color: var(--cyan); }
    .store-btn-icon { font-size: 24px; }
    .store-btn-text { text-align: left; }
    .store-btn-sub { font-size: 10px; color: var(--gray); }
    .store-btn-name { font-size: 14px; font-weight: 600; color: var(--light); }

    /* --- FOOTER --- */
    footer {
      padding: 40px; border-top: 1px solid rgba(255,255,255,0.05);
      display: flex; justify-content: space-between; align-items: center;
    }
    .footer-logo { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 4px; color: var(--cyan); }
    .footer-copy { font-size: 12px; color: var(--gray); }

    /* Responsive */
    @media (max-width: 768px) {
      .features-grid { grid-template-columns: 1fr; }
      .stats-row { grid-template-columns: 1fr 1fr; }
      .eco-inner { grid-template-columns: 1fr; }
      nav { padding: 16px 20px; }
      .nav-links { display: none; }
      .hero { padding: 100px 20px 60px; }
      .hero-phones { flex-direction: column; align-items: center; }
      .phone.side { display: none; }
      .section { padding: 60px 20px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const COLORS = {
      cyan: "#00D9CC",
      yellow: "#F5C542",
      purple: "#D96AE8",
      light: "#F2F0EF",
      dark: "#2B2B2B",
      gray: "#5A5A5A",
    };

    const features = [
      { icon: "🎟️", title: "Billetterie intégrée", desc: "Achetez vos billets directement dans l'app. QR codes dématérialisés, notifications en temps réel.", tag: "Billetterie", tagColor: COLORS.purple },
      { icon: "🚆", title: "Trajets bas carbone", desc: "Train, bus, covoiturage dédié. Comparez les prix, la durée et l'impact carbone de chaque option.", tag: "Transport", tagColor: COLORS.cyan },
      { icon: "🏨", title: "Logement optimisé", desc: "Hébergements proches de l'événement, filtrés par prix et distance, réservables en un tap.", tag: "Logement", tagColor: COLORS.yellow },
      { icon: "🌱", title: "Éco-score visuel", desc: "Visualisez et comparez l'empreinte carbone de vos choix. Des suggestions pour réduire votre impact.", tag: "Écologie", tagColor: "#00ff88" },
      { icon: "👥", title: "Social & communauté", desc: "Rejoignez des groupes, organisez du covoiturage, échangez avec les participants d'un événement.", tag: "Social", tagColor: COLORS.purple },
      { icon: "🤖", title: "Assistant IA", desc: "Génération automatique du parcours complet — billet + trajet + logement — selon votre budget.", tag: "IA", tagColor: COLORS.cyan },
    ];

    const journeySteps = [
      { num: "01", title: "Découvrir l'événement", desc: "L'utilisateur browse les événements par catégorie, date ou lieu. Recommandations personnalisées par l'IA.", color: COLORS.cyan, bg: "rgba(0,217,204,0.1)", border: "rgba(0,217,204,0.3)" },
      { num: "02", title: "Acheter son billet", desc: "Sélection du type de billet, paiement sécurisé, QR code généré instantanément dans l'app.", color: COLORS.purple, bg: "rgba(217,106,232,0.1)", border: "rgba(217,106,232,0.3)" },
      { num: "03", title: "Organiser son trajet", desc: "Suggestions de transport bas carbone avec comparateur prix / durée / CO₂. Réservation directe.", color: COLORS.yellow, bg: "rgba(245,197,66,0.1)", border: "rgba(245,197,66,0.3)" },
      { num: "04", title: "Réserver son logement", desc: "Hébergements suggérés selon le lieu et le trajet. Filtres personnalisés, réservation en 2 clics.", color: COLORS.cyan, bg: "rgba(0,217,204,0.1)", border: "rgba(0,217,204,0.3)" },
      { num: "05", title: "Vivre l'événement", desc: "Infos pratiques, programme, plan du lieu, notifications en temps réel, chat communautaire.", color: COLORS.purple, bg: "rgba(217,106,232,0.1)", border: "rgba(217,106,232,0.3)" },
    ];

    const tickerItems = ["Billetterie", "Transport", "Logement", "Éco-score", "IA", "Communauté", "Festivals", "Concerts", "Salons", "Conférences"];

    function PhoneHome() {
      return (
        <div className="phone main">
          <div className="phone-notch">
            <div className="phone-notch-pill"></div>
          </div>
          <div className="phone-screen screen-home">
            <div className="screen-header">
              <div>
                <div className="screen-greeting">Bonjour 👋</div>
                <div className="screen-user">Alex Martin</div>
              </div>
              <div className="screen-avatar">A</div>
            </div>
            <div className="event-card-big">
              <div className="event-badge">🔥 Tendance</div>
              <div className="event-title">Rock en Seine 2026</div>
              <div className="event-meta">📍 Paris · 23-26 août</div>
              <div className="event-price">À partir de 59€</div>
            </div>
            <div className="mini-cards">
              <div className="mini-card">
                <div className="mini-icon">🚆</div>
                <div className="mini-label">Trajet</div>
                <div className="mini-val">2h10</div>
              </div>
              <div className="mini-card">
                <div className="mini-icon">🏨</div>
                <div className="mini-label">Logement</div>
                <div className="mini-val">89€/nuit</div>
              </div>
              <div className="mini-card">
                <div className="mini-icon">🌱</div>
                <div className="mini-label">CO₂</div>
                <div className="mini-val">2.1kg</div>
              </div>
            </div>
          </div>
          <div className="tab-bar">
            {["🏠", "🔍", "🎟️", "👥", "👤"].map((t, i) => (
              <div key={i} className={`tab ${i === 0 ? 'active' : ''}`}>
                {t}
                {i === 0 && <div className="tab-dot"></div>}
              </div>
            ))}
          </div>
        </div>
      );
    }

    function PhoneEvent() {
      return (
        <div className="phone side">
          <div className="phone-notch">
            <div className="phone-notch-pill"></div>
          </div>
          <div className="phone-screen screen-event">
            <div className="event-hero-img">🎵</div>
            <div className="event-detail-body">
              <div className="event-name">Daft Punk Tribute Night</div>
              <div className="event-date-row">
                <span className="event-chip">📅 15 juin</span>
                <span className="event-chip">📍 Lyon</span>
              </div>
              <div className="steps-row">
                <div className="step-item">
                  <div className="step-num">1</div>
                  <div className="step-lbl">Billet</div>
                </div>
                <div className="step-item">
                  <div className="step-num">2</div>
                  <div className="step-lbl">Trajet</div>
                </div>
                <div className="step-item">
                  <div className="step-num">3</div>
                  <div className="step-lbl">Hôtel</div>
                </div>
              </div>
              <div className="eco-bar">
                <div className="eco-title">🌱 Éco-score</div>
                <div className="eco-track">
                  <div className="eco-fill"></div>
                </div>
                <div className="eco-lbl">Trajet train — Impact faible</div>
              </div>
            </div>
          </div>
          <div className="tab-bar">
            {["🏠", "🔍", "🎟️", "👥", "👤"].map((t, i) => (
              <div key={i} className={`tab ${i === 2 ? 'active' : ''}`}>
                {t}
                {i === 2 && <div className="tab-dot"></div>}
              </div>
            ))}
          </div>
        </div>
      );
    }

    function PulsarLanding() {
      const [scrolled, setScrolled] = useState(false);
      useEffect(() => {
        const handler = () => setScrolled(window.scrollY > 50);
        window.addEventListener("scroll", handler);
        return () => window.removeEventListener("scroll", handler);
      }, []);

      return (
        <div className="grain">
          {/* NAV */}
          <nav>
            <div className="nav-logo">✦ PULSAR</div>
            <div className="nav-links">
              <a href="#features">Fonctionnalités</a>
              <a href="#journey">Parcours</a>
              <a href="#eco">Éco-impact</a>
              <button className="nav-cta">Télécharger</button>
            </div>
          </nav>

          {/* HERO */}
          <section className="hero">
            <div className="hero-bg"></div>
            <div className="hero-tag">✦ La nouvelle façon de vivre les événements</div>
            <h1 className="hero-title">
              VIS TES<br/>ÉVÉNEMENTS<br/><span>À FOND.</span>
            </h1>
            <p className="hero-sub">Billet, transport, logement — tout en une app. Plus simple, plus rapide, plus responsable.</p>
            <div className="hero-actions">
              <button className="btn-primary">Commencer gratuitement →</button>
              <button className="btn-secondary">Voir la démo</button>
            </div>
            <div className="hero-phones">
              <PhoneHome />
              <PhoneEvent />
            </div>
          </section>

          {/* TICKER */}
          <div className="ticker-wrap">
            <div className="ticker-inner">
              {[...tickerItems, ...tickerItems].map((item, i) => (
                <div key={i} className="ticker-item">
                  {item} <span className="ticker-sep">✦</span>
                </div>
              ))}
            </div>
          </div>

          {/* FEATURES */}
          <section className="section" id="features">
            <div className="section-label">Fonctionnalités</div>
            <h2 className="section-title">TOUT CE DONT<br/><em>TU AS BESOIN</em></h2>
            <div className="features-grid">
              {features.map((f, i) => (
                <div className="feature-card" key={i} style={{animationDelay: `${i * 0.1}s`}}>
                  <div className="feature-icon">{f.icon}</div>
                  <div className="feature-title">{f.title}</div>
                  <div className="feature-desc">{f.desc}</div>
                  <span className="feature-tag" style={{background: f.tagColor + '20', color: f.tagColor, border: `1px solid ${f.tagColor}40`}}>{f.tag}</span>
                </div>
              ))}
            </div>
          </section>

          {/* STATS */}
          <section className="section">
            <div className="stats-row">
              <div className="stat-item">
                <div className="stat-val">70%</div>
                <div className="stat-label">de l'empreinte carbone provient des déplacements</div>
              </div>
              <div className="stat-item">
                <div className="stat-val">3 EN 1</div>
                <div className="stat-label">billet, transport, logement centralisés</div>
              </div>
              <div className="stat-item">
                <div className="stat-val">-40%</div>
                <div className="stat-label">CO₂ en choisissant les trajets recommandés</div>
              </div>
              <div className="stat-item">
                <div className="stat-val">∞</div>
                <div className="stat-label">types d'événements supportés</div>
              </div>
            </div>
          </section>

          {/* JOURNEY */}
          <section className="journey-section" id="journey">
            <div className="journey-inner">
              <div className="section-label">Parcours utilisateur</div>
              <h2 className="section-title">DE LA DÉCOUVERTE<br/><em>À L'EXPÉRIENCE</em></h2>
              <div className="journey-steps">
                {journeySteps.map((step, i) => (
                  <div className="journey-step" key={i}>
                    <div className="journey-num" style={{background: step.bg, border: `2px solid ${step.border}`, color: step.color}}>{step.num}</div>
                    <div className="journey-content">
                      <div className="journey-title">{step.title}</div>
                      <div className="journey-desc">{step.desc}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* ECO */}
          <section className="eco-section" id="eco">
            <div className="eco-inner">
              <div>
                <div className="section-label">Impact écologique</div>
                <h2 className="section-title">VOYAGER<br/><em>RESPONSABLE</em></h2>
                <p style={{color: 'rgba(242,240,239,0.55)', lineHeight: 1.6, marginBottom: 20, fontWeight: 300, fontSize: 14}}>
                  Pulsar calcule et affiche l'empreinte carbone de chaque choix de transport. Compare les options et prend des décisions éclairées pour réduire ton impact.
                </p>
                <div style={{display: 'flex', flexWrap: 'wrap', gap: 8}}>
                  {["Train recommandé", "Covoiturage -30%", "Bus collectif", "Compensation CO₂"].map((tag, i) => (
                    <span key={i} style={{fontSize: 11, padding: '6px 14px', borderRadius: 100, background: 'rgba(0,217,204,0.08)', border: '1px solid rgba(0,217,204,0.2)', color: COLORS.cyan, fontWeight: 500}}>{tag}</span>
                  ))}
                </div>
              </div>
              <div style={{textAlign: 'center'}}>
                <div className="eco-score">
                  <div className="eco-score-inner">
                    <div className="eco-val">A+</div>
                    <div className="eco-unit">Éco-score</div>
                  </div>
                </div>
                <p style={{color: 'rgba(242,240,239,0.4)', fontSize: 13, marginTop: 20}}>Score moyen avec les trajets Pulsar</p>
              </div>
            </div>
          </section>

          {/* CTA */}
          <section className="cta-section">
            <h2 className="cta-title">PRÊT(E) À<br/>PULSAR ?</h2>
            <p className="cta-sub">Rejoins des milliers de festivaliers qui organisent leurs événements autrement.</p>
            <div className="store-btns">
              <div className="store-btn">
                <span className="store-btn-icon">🍎</span>
                <div className="store-btn-text">
                  <div className="store-btn-sub">Télécharger sur l'</div>
                  <div className="store-btn-name">App Store</div>
                </div>
              </div>
              <div className="store-btn">
                <span className="store-btn-icon">▶</span>
                <div className="store-btn-text">
                  <div className="store-btn-sub">Disponible sur</div>
                  <div className="store-btn-name">Google Play</div>
                </div>
              </div>
            </div>
          </section>

          {/* FOOTER */}
          <footer>
            <div className="footer-logo">✦ PULSAR</div>
            <div className="footer-copy">© 2026 Pulsar — Équipe Neptune</div>
          </footer>
        </div>
      );
    }

    // Rendu final
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<PulsarLanding />);
  </script>
</body>
</html>
